'';position:fixed;inset:0;background:rgba(10,20,40,0.62);z-index:0;pointer-events:none}.header,.container,#dashboard{position:relative;z-index:1}
.header{background:linear-gradient(135deg,#00BDD2 0%,#007a8a 40%,#00355B 100%);border-bottom:3px solid #00BDD2;padding:0 48px;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;justify-content:space-between;align-items:stretch;min-height:76px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(255,255,255,.07) 0%,transparent 65%);pointer-events:none}
.header-left{display:flex;align-items:center;gap:22px;padding:16px 0;position:relative}
.logo-mark{width:44px;height:44px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.3)}
.logo-text .brand{font-size:26px;font-weight:300;color:white;letter-spacing:1.5px;line-height:1;font-family:var(--font-main)}
.logo-text .brand sup{font-size:11px;vertical-align:super;opacity:.7;font-weight:400}
.logo-text .tagline{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.hdr-sep{width:1px;height:38px;background:rgba(255,255,255,.18)}
.hdr-product .pname{font-size:14px;font-weight:600;color:white;letter-spacing:.4px}
.hdr-product .psub{font-size:10.5px;color:rgba(255,255,255,.5);letter-spacing:.4px;margin-top:2px}
.header-right{display:flex;align-items:center;position:relative}
.hdr-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:5px 16px;font-size:10.5px;color:rgba(255,255,255,.7);letter-spacing:.6px}
.container{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:24px}
.progress-wrap{background:rgba(255,255,255,0.95);border-radius:12px;padding:16px 24px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.progress-label{font-size:13px;color:#555;margin-bottom:8px;display:flex;justify-content:space-between}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#F79428,#D74B29);border-radius:4px;transition:width 0.4s}
.chat-wrap{background:rgba(255,255,255,0.97);border-radius:15px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;min-height:500px}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;max-height:62vh}
.message{display:flex;gap:12px;max-width:85%;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.bot-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;display:block;flex-shrink:0}
.message.user .avatar{background:transparent;padding:0;}
.message.assistant .avatar{background:#F79428}
.bubble{padding:12px 18px;border-radius:18px;line-height:1.6;color:#333}
.message.user .bubble{background:#00A28F;color:white}
.message.assistant .bubble{background:#f5f7fa}
.q-card{background:white;border:2px solid #e8e8f5;border-radius:16px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.q-domain{display:inline-block;background:#FFF3E6;color:#F79428;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:6px}
.q-sub{font-size:12px;color:#888;margin-bottom:10px}
.q-text{font-size:15px;color:#222;font-weight:500;margin-bottom:16px;line-height:1.5}
.q-options{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:#f9f9ff;border:1.5px solid #dde;border-radius:10px;padding:10px 16px;text-align:left;font-size:14px;cursor:pointer;transition:all .2s;color:#333}
.opt-btn:hover{background:#eef0ff;border-color:#667eea;color:#F79428;transform:translateX(4px)}
.opt-btn.selected{background:linear-gradient(135deg,#F79428,#D74B29);color:white;border-color:transparent}
.opt-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
/* Intake form card */
.intake-card{background:white;border:2px solid #e8e8f5;border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.intake-card h3{color:#F79428;font-size:15px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group input{width:100%;padding:10px 14px;border:1.5px solid #dde;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;font-family:var(--font-main)}
.form-group input:focus{border-color:#F79428}
.form-group input.error{border-color:#D74B29}
.consent-wrap{background:#fff5f5;border:1.5px solid #f9b4bc;border-radius:10px;padding:14px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.consent-wrap input[type=checkbox]{margin-top:3px;width:16px;height:16px;cursor:pointer;accent-color:#F79428;flex-shrink:0}
.consent-wrap label{font-size:12px;color:#444;line-height:1.6;cursor:pointer}
.consent-wrap label b{color:#F79428}
.intake-submit{background:linear-gradient(135deg,#F79428,#D74B29);color:white;border:none;padding:12px 32px;border-radius:25px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s;display:block;margin:0 auto}
.intake-submit:hover{transform:scale(1.04)}
.intake-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.field-err{font-size:11px;color:#D74B29;margin-top:3px;display:none}
.input-area{padding:16px 24px;border-top:1px solid #eee;display:flex;gap:12px}
.chat-input{flex:1;padding:13px 20px;border:2px solid #e0e0e0;border-radius:25px;font-size:15px;outline:none;transition:border-color .3s}
.chat-input:focus{border-color:#F79428}
.send-btn{background:linear-gradient(135deg,#F79428,#D74B29);color:white;border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.send-btn:hover{transform:scale(1.1)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.continue-card{background:#fff5f5;border:2px solid #f9b4bc;border-radius:16px;padding:20px 24px;text-align:center}
.continue-card p{font-size:15px;color:#333;margin-bottom:14px;font-weight:500}
.continue-btns{display:flex;gap:12px;justify-content:center}
.btn-yes{background:linear-gradient(135deg,#00A28F,#00A28F);color:white;border:none;padding:12px 36px;border-radius:25px;font-size:15px;font-weight:600;cursor:pointer}
.btn-no{background:linear-gradient(135deg,#D74B29,#F79428);color:white;border:none;padding:12px 36px;border-radius:25px;font-size:15px;font-weight:600;cursor:pointer}
.goodbye-card{background:linear-gradient(135deg,#F79428,#D74B29);border-radius:16px;padding:28px 32px;text-align:center;color:white}
.bye-emoji{font-size:48px;margin-bottom:10px}
.goodbye-card p{font-size:17px;font-weight:500;line-height:1.6}
.typing{display:none;padding:10px 16px;background:#f5f7fa;border-radius:18px;width:fit-content;margin:0 24px 8px}
.typing span{height:8px;width:8px;background:#aaa;border-radius:50%;display:inline-block;margin:0 2px;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
/* Dashboard */
#dashboard{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;padding:20px;overflow-y:auto}
#dash-inner{background:white;border-radius:20px;padding:36px;max-width:1100px;margin:0 auto;position:relative}
#dash-inner h2{color:#F79428;margin-bottom:4px;font-size:22px}
.subtitle{color:#888;font-size:13px;margin-bottom:6px}
.user-meta{font-size:12px;color:#aaa;margin-bottom:18px}
.close-dash{position:absolute;top:16px;right:16px;border:none;background:#f0f0f0;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer}
.close-dash:hover{background:#ddd}
.print-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6D6E71,#4a4a4a);color:white;border:none;padding:11px 24px;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:20px}
.download-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00A28F,#007a6b);color:white;border:none;padding:11px 24px;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:20px;margin-left:10px}
.download-btn:hover{opacity:.9}
.download-btn:disabled{opacity:.6;cursor:not-allowed}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;align-items:center}
.score-hero{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.score-card{border-radius:16px;padding:20px 24px;text-align:center;flex:1;min-width:140px}
.score-card.compliance{background:linear-gradient(135deg,#5D7B9A,#3d5a7a);color:white}
.score-card.noncompliance{background:linear-gradient(135deg,#F79428,#D74B29);color:white}
.score-card.maturity{background:linear-gradient(135deg,#00A28F,#007a6b);color:white}
.score-card .val{font-size:42px;font-weight:700;line-height:1}
.score-card .lbl{font-size:12px;opacity:.85;margin-top:4px}
.score-card .lvl{font-size:13px;font-weight:600;margin-top:6px;background:rgba(255,255,255,.2);border-radius:8px;padding:3px 10px}
.charts-row{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.chart-box{background:#f9f9ff;border-radius:14px;padding:16px;flex:1;min-width:280px}
.chart-box h4{color:#F79428;font-size:14px;margin-bottom:12px}
canvas{display:block;max-width:100%}
.section-title{font-size:15px;font-weight:700;color:#F79428;margin:24px 0 10px;border-left:4px solid #F79428;padding-left:10px}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.domain-card{border:1.5px solid #eee;border-radius:12px;padding:14px}
.d-name{font-size:13px;font-weight:600;color:#333;margin-bottom:3px}
.d-sub{font-size:11px;color:#888;margin-bottom:8px}
.d-bar-wrap{height:6px;background:#eee;border-radius:3px;margin-bottom:6px}
.d-bar{height:100%;border-radius:3px}
.d-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666;flex-wrap:wrap;gap:4px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-0{background:#ffeaea;color:#D74B29}.badge-1{background:#fff3e0;color:#e65100}
.badge-2{background:#fff9c4;color:#f57f17}.badge-3{background:#e0f5f3;color:#007a6b}
.badge-4{background:#e0f5f3;color:#005c52}
.gap-flag{font-size:10px;background:#ffeaea;color:#D74B29;padding:2px 6px;border-radius:8px;font-weight:600}
.hr-flag{font-size:10px;background:#fff3e0;color:#D74B29;padding:2px 6px;border-radius:8px;font-weight:600}
.rr-table{width:100%;border-collapse:collapse;font-size:12px}
.rr-table th{background:#FFF3E6;color:#F79428;padding:9px 10px;text-align:left;border-bottom:2px solid #dde}
.rr-table td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.rr-table tr:hover td{background:#fff5f5}
.score-pill{display:inline-block;width:24px;height:24px;border-radius:50%;color:white;font-weight:700;font-size:12px;text-align:center;line-height:24px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
@media print{
 #dashboard{display:block!important;position:static;background:white;padding:0;overflow:visible}
 #dash-inner{box-shadow:none;border-radius:0;padding:10px;max-width:100%}
 .close-dash,.print-btn,.download-btn,.btn-row{display:none!important}
 body>*:not(#dashboard){display:none!important}
 .charts-row{page-break-inside:avoid}
}

const KB = {"domain_weights": {"Data Flow & Data Lifecycle Understanding": 1.0, "Policies, Notices & Consents": 1.2, "Data Principal Rights Management": 1.2, "Data Retention & Disposal Mechanisms": 1.0, "Incident Response & Breach Notification": 1.2, "Training & Awareness": 1.0, "Third Party Vendor Management / Data Sharing & Transfer": 1.0, "Encryption & Data Security": 1.0, "Monitoring & Continuous Improvement": 1.0, "Privacy by Design & DPIA": 1.0, "Access & Identity Governance": 1.0, "Infrastructure & Network Security": 1.0, "Governance & Strategy": 1.0, "Cross Border Data Transfer / Data Localization": 1.2}, "high_weight_domains": ["Policies, Notices & Consents", "Data Principal Rights Management", "Incident Response & Breach Notification", "Cross Border Data Transfer / Data Localization"], "nc_threshold": 50, "hr_threshold": 25, "questions": [{"id": 1, "domain": "Data Flow & Data Lifecycle Understanding", "sub": "Data Inventory", "q": "Do you maintain an up-to-date inventory/record of all personal data processing activities, including purposes, categories of data principals, and data types as required under DPDPA?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal processing inventory exists, resulting in absence of visibility over personal data usage, storage, sharing, and purpose accountability. This may lead to uncontrolled processing and inability to demonstrate governance during audit review.", "road": "Establish a centralized processing register capturing purposes, data categories, systems, recipients, retention logic, and responsible owners. Mandate enterprise-wide completion."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Processing records appear to be maintained informally or in fragmented formats, increasing risk of incomplete coverage and inconsistent regulatory defensibility.", "road": "Standardize inventory template, consolidate records centrally, and assign accountable business owners for maintenance."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Processing inventory is documented but not consistently implemented across all business units or systems, creating visibility gaps.", "road": "Conduct enterprise reconciliation of systems, vendors, and workflows and enforce mandatory completion with governance oversight."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Processing inventory is implemented; however updates may not always align with operational or system changes.", "road": "Integrate inventory updates into change management, vendor onboarding, and new system deployment workflows."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Processing inventory is mature and monitored with strong governance oversight. Residual risk limited to ongoing operational effectiveness.", "road": "Maintain automated discovery support, periodic attestation cycles, and independent validation reviews."}}}, {"id": 2, "domain": "Policies, Notices & Consents", "sub": "Privacy Notice", "q": "Is an external-facing privacy notice published that clearly covers purposes, categories of personal data, rights, retention, data sharing, and grievance officer details in line with DPDPA requirements?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No compliant external notice is available, preventing transparent disclosure of processing practices and rights mechanisms, exposing the organization to supervisory action and reputational risk.", "road": "Develop and publish comprehensive privacy notice covering processing purposes, rights channels, retention practices, sharing arrangements, and grievance contact details."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Notice exists but disclosures appear incomplete or inconsistently published, creating transparency gaps.", "road": "Perform structured disclosure gap review and standardize approved notice language across all platforms."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Notice is documented but not consistently deployed across all collection channels or business interfaces.", "road": "Implement centralized notice governance and enforce mandatory deployment checkpoints."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Notice is implemented and operational; however structured periodic review may not be formalized.", "road": "Introduce scheduled compliance and legal review cycle triggered by processing or regulatory changes."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Transparency framework is mature and actively governed.", "road": "Sustain periodic independent review and continuous monitoring of disclosure completeness."}}}, {"id": 3, "domain": "Data Principal Rights Management", "sub": "Access Requests", "q": "Is there a defined and documented process to receive, authenticate, and respond to data principal access requests?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No structured rights handling process exists, creating risk of failure to respond to verified requests within expected timelines.", "road": "Implement formal request workflow including intake channel, identity verification, response timeline tracking, and escalation procedures."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Requests appear to be handled informally, increasing likelihood of inconsistent authentication or delayed responses.", "road": "Standardize request handling SOP and centralize tracking."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Process documented but not uniformly operational across teams.", "road": "Deploy centralized request tracking system and conduct organization-wide training."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Process operational but monitoring metrics may not be consistently reviewed.", "road": "Introduce SLA dashboards and periodic compliance audits."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Mature rights management framework exists with monitoring and traceability.", "road": "Maintain automated workflow optimization and periodic control assurance testing."}}}, {"id": 4, "domain": "Data Retention & Disposal Mechanisms", "sub": "Retention Schedules", "q": "Have retention periods been defined for key categories of personal data based on legal, regulatory, and business requirements?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formally approved retention schedule is defined for personal data. Absence of defined retention periods may result in uncontrolled storage duration, excessive data accumulation, or premature deletion, limiting the organisation’s ability to demonstrate lawful handling, storage limitation, and defensible disposal practices during supervisory or audit review.", "road": "Develop and approve an enterprise retention schedule covering all personal data categories. Align retention periods with statutory obligations, contractual needs, dispute defence requirements, and operational necessity. Implement governance ownership and organization-wide adoption."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Retention practices appear to exist but are informal, undocumented, or applied inconsistently across departments and systems. This creates risk of uneven deletion practices, legacy data buildup, and inability to evidence consistent lifecycle governance.", "road": "Document current retention practices into a standardized retention matrix. Validate with legal, compliance, and records management stakeholders, and communicate mandatory implementation requirements to all business units."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented retention schedule exists but implementation appears partial, with certain systems, archives, backups, or third-party environments potentially outside enforcement scope. This may result in incomplete lifecycle control.", "road": "Conduct enterprise validation of retention enforcement across production systems, archival repositories, backups, and vendor-managed environments. Extend technical enforcement mechanisms and esta"}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Retention controls are defined and implemented; however monitoring of actual deletion execution and periodic review of retention appropriateness may not be consistently evidenced.", "road": "Introduce periodic retention compliance reporting, automated deletion logs, and scheduled review of retention timelines to confirm continued legal and operational suitability."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Retention governance is formally defined, implemented, monitored, and periodically reviewed. Residual risk is limited to ongoing operational effectiveness and future regulatory or business changes.", "road": "Maintain automated lifecycle enforcement, periodic legal refresh of retention timelines, independent assurance reviews, and governance reporting to sustain control maturity."}}}, {"id": 5, "domain": "Incident Response & Breach Notification", "sub": "Detection & Logging", "q": "Do you have processes and tooling to detect, log, and classify security and privacy incidents involving personal data?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal incident detection, logging, or classification framework is established for events involving personal data. Absence of structured monitoring may result in delayed identification of compromise events, inability to assess breach impact, failure to initiate timely containment actions, and lack of defensible audit trail for supervisory review.", "road": "Establish an enterprise incident management framework covering detection, centralized logging, incident classification, escalation thresholds, and response procedures for events involving personal data. Deploy logging capability across infrastructure, applications, endpoints, and cloud environments with defined ownership and reporting lines."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Incident detection or logging activities appear to exist but are informal, manually driven, or inconsistently applied across systems. This increases the likelihood of delayed escalation, incomplete incident records, and inconsistent breach severity determination.", "road": "Document and formalize incident detection and reporting procedures. Define standardized classification criteria, mandatory reporting timelines, and centralized incident recording mechanisms. Train operational teams on escalation protocols."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented incident response and logging framework exists; however implementation appears partial, with certain business applications, repositories, or third-party environments potentially outside monitoring coverage. This may result in incomplete visibility into personal data incidents.", "road": "Conduct enterprise monitoring coverage assessment and extend logging and alerting integration across all production systems, databases, user environments, and vendor interfaces. Validate completeness through technical configuration review and operational testing."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Incident detection, logging, and classification controls are implemented and operational; however periodic validation of response readiness, logging completeness, and escalation effectiveness may not be consistently evidenced.", "road": "Introduce structured incident response testing through tabletop exercises, breach simulations, and periodic control effectiveness reviews. Implement management dashboards for incident metrics, response timelines, and closure validation."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Incident management capability is mature, monitored, and periodically reviewed with demonstrable logging, classification accuracy, and response traceability. Residual exposure is limited to ongoing operational effectiveness and emerging threat patterns.", "road": "Sustain continuous monitoring improvements, automated alert correlation, periodic independent assurance testing, and governance reporting to ensure continued operational readiness and control maturity."}}}, {"id": 6, "domain": "Training & Awareness", "sub": "Induction Training", "q": "Do new employees receive basic training on data privacy obligations and internal data handling expectations during onboarding?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No structured privacy or personal data handling training is provided during employee onboarding. Absence of foundational awareness increases likelihood of improper collection, access, sharing, or storage of personal data, elevating operational breach risk and limiting the organisation’s ability to demonstrate staff awareness controls during audit review.", "road": "Establish mandatory onboarding training covering personal data handling responsibilities, acceptable use practices, incident reporting obligations, and confidentiality expectations. Require completion prior to granting system access and maintain centralized completion records."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Privacy awareness activities appear to exist informally or are delivered inconsistently across departments or hiring locations. This may result in uneven employee understanding of data handling obligations and inconsistent operational practices.", "road": "Formalize onboarding privacy training into a standardized enterprise curriculum. Define mandatory delivery process, maintain attendance tracking, and ensure consistent rollout across all employee groups including contractors and temporary staff."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented onboarding training program exists but implementation appears partial, with some workforce segments, business units, or privileged users potentially not covered or not tracked consistently.", "road": "Conduct enterprise training coverage validation and extend mandatory training enforcement to all workforce categories. Implement centralized learning management tracking and compliance reporting to management."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Privacy onboarding training is implemented and operational with completion tracking; however periodic content updates, effectiveness measurement, or reinforcement mechanisms may not be consistently evidenced.", "road": "Introduce scheduled content review cycles, periodic refresher training requirements, and targeted role-based modules for high-risk processing functions. Track comprehension through assessments and management reporting."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Training framework is mature, monitored, periodically refreshed, and supported by completion metrics and governance oversight. Residual exposure is limited to maintaining ongoing workforce awareness as processing practices evolve.", "road": "Sustain continuous improvement through annual refresh cycles, scenario-based awareness exercises, targeted campaigns following incidents or control changes, and periodic independent review of training effectiveness."}}}, {"id": 7, "domain": "Third Party Vendor Management / Data Sharing & Transfer", "sub": "Vendor Inventory", "q": "Do you maintain an inventory of third parties and processors that receive or access personal data, including purpose and data categories?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No centralized inventory of third parties or processors with access to personal data is maintained. Absence of vendor visibility may result in uncontrolled external data sharing, inability to demonstrate accountability over downstream processing, and increased exposure to unauthorized access or regulatory observation during audit review.", "road": "Establish an enterprise third-party register capturing all vendors and processors handling personal data. Record processing purpose, data categories shared, system access, hosting location, contractual safeguards, and responsible business owner. Mandate organization-wide completion."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Vendor information appears to be tracked informally or across fragmented procurement, legal, or operational records. This may lead to incomplete visibility of processors, inconsistent contractual oversight, and gaps in monitoring third-party handling practices.", "road": "Consolidate existing vendor information into a standardized centralized inventory. Define mandatory vendor onboarding data fields and assign ownership for maintaining the register. Align procurement, legal, and technology functions to a single reporting mechanism."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented vendor inventory exists but implementation appears partial, with certain legacy vendors, SaaS platforms, affiliates, or operational partners potentially outside formal tracking. This may result in incomplete coverage of personal data transfers.", "road": "Perform enterprise vendor discovery exercise covering procurement records, IT asset inventories, payment systems, and business unit contracts. Reconcile findings with the central vendor register and enforce mandatory inclusion before contract renewal or system integration."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Vendor inventory is implemented and operational; however periodic validation of vendor scope, data categories handled, and ongoing processor status may not be consistently evidenced. Changes in vendor services may therefore not always be reflected promptly.", "road": "Introduce periodic vendor register attestation cycles, integrate updates into procurement change workflows, and require business owners to confirm processing scope annually. Establish monitoring dashboards for inventory completeness."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Vendor governance framework is mature with maintained inventory, ownership assignment, and periodic review processes. Residual exposure is limited to ongoing", "road": "Sustain continuous vendor lifecycle governance through automated procurement integration, scheduled compliance reassessment, periodic independent validation, and governance reporting to senior management."}}}, {"id": 8, "domain": "Encryption & Data Security", "sub": "Encryption Controls", "q": "Is personal data encrypted in transit and at rest for key systems, databases, and endpoints where feasible?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal encryption controls are implemented for protection of personal data in transit or at rest. Absence of cryptographic safeguards increases the likelihood of unauthorized disclosure in the event of interception, system compromise, device loss, or unauthorized storage access, and limits the organisation’s ability to demonstrate reasonable technical protection measures.", "road": "Define and implement an enterprise encryption standard mandating protection of personal data in transit and at rest across servers, databases, endpoints, storage media, and backups. Establish approved cryptographic protocols, deployment timelines, and accountable system owners."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Encryption appears to be applied selectively or informally, with inconsistent protection across systems, repositories, or transmission channels. This may result in sensitive data remaining exposed in certain applications or operational workflows.", "road": "Conduct an enterprise encryption gap assessment covering applications, databases, file storage, endpoints, and data transmission paths. Formalize cryptographic policy specifying mandatory encryption requirements and implementation priorities."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Encryption standards are documented but implementation appears partial, with some legacy platforms, integrations, archived repositories, or vendor-managed environments potentially outside encryption enforcement. This creates uneven data protection coverage.", "road": "Extend encryption deployment across all applicable environments including legacy systems, backups, removable media, and third-party hosted platforms. Validate implementation through configuration review, vulnerability scans, and system certification checks."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Encryption controls are implemented and operational for key systems; however centralized oversight of key lifecycle management, configuration consistency, or periodic validation may not be fully evidenced.", "road": "Introduce centralized cryptographic governance including key generation, storage, rotation, revocation, and access controls. Implement periodic configuration audits and automated monitoring of encryption status across environments."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Encryption framework is mature, standardized, and actively monitored with defined governance over cryptographic implementation and key management. Residual exposure is limited to maintaining operational effectiveness and adapting to evolving security practices.", "road": "Sustain continuous cryptographic governance through automated compliance monitoring, periodic independent technical assurance, formal key lifecycle reviews, and scheduled reassessment of encryption standards against emerging risks."}}}, {"id": 9, "domain": "Monitoring & Continuous Improvement", "sub": "Internal Audits", "q": "Are internal audits or independent assessments of privacy and data protection controls conducted at defined intervals?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No structured internal audit or independent control assessment mechanism exists for privacy or personal data protection practices. Absence of periodic assurance reviews may result in unidentified control gaps, delayed remediation of deficiencies, and inability to demonstrate ongoing governance oversight during supervisory examination.", "road": "Establish a formal privacy assurance program defining scope, audit frequency, methodology, reporting structure, and responsible oversight function. Mandate periodic internal reviews of data protection controls across business units, systems, and third-party processing arrangements."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Review activities appear informal or conducted on an ad-hoc basis without a defined audit schedule or standardized methodology. This increases the likelihood that control weaknesses remain undetected or inconsistently documented.", "road": "Formalize an internal audit schedule with documented audit procedures, standardized control checklists, and reporting templates. Assign responsibility to an independent assurance or compliance function and ensure management review of findings."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented audit framework exists but implementation appears partial, with certain systems, business processes, or operational units potentially outside periodic review coverage. This may result in incomplete control assurance.", "road": "Conduct enterprise audit coverage assessment and extend review scope across all personal data processing environments, including technology platforms, operational workflows, and external processors. Track completion centrally and enforce remediation follow-up."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Internal audits are implemented and conducted periodically; however structured tracking of remediation closure, control effectiveness validation, or trend analysis may not be consistently evidenced.", "road": "Introduce centralized audit issue tracking, remediation deadline monitoring, and periodic management reporting on control effectiveness trends. Perform follow-up validation reviews to confirm closure of audit findings."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Audit and assurance processes are mature, risk-based, periodically executed, and supported by management oversight and remediation governance. Residual exposure is limited to maintaining continuous effectiveness as operations evolve.", "road": "Sustain continuous improvement through risk-based audit planning, independent review participation where appropriate, periodic methodology updates, and governance reporting to senior leadership on control health indicators."}}}, {"id": 10, "domain": "Privacy by Design & DPIA", "sub": "Change Management Integration", "q": "Are new projects, products, features, or significant changes involving personal data required to undergo privacy impact or design review?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal privacy review or impact assessment requirement exists within project or change management processes. Absence of early-stage privacy evaluation may result in deployment of systems or workflows with uncontrolled personal data collection, excessive processing, or inadequate safeguards, limiting the organisation’s ability to demonstrate preventive governance.", "road": "Establish a mandatory privacy review framework embedded within project lifecycle and change approval processes. Define assessment triggers, review checkpoints, approval authority, and documentation requirements prior to implementation of any initiative involving personal data."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Privacy considerations appear to be reviewed informally or on a case-by-case basis without standardized criteria or documented approval workflow. This may result in inconsistent risk identification and uneven safeguard implementation across initiatives.", "road": "Document a standardized privacy impact assessment procedure defining risk screening criteria, mandatory documentation templates, reviewer roles, and escalation paths. Train project, product, and technology teams on mandatory submission requirements."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented privacy review process exists but implementation appears partial, with certain business units, rapid deployments, or system enhancements potentially bypassing formal assessment. This may create gaps in preventive control coverage.", "road": "Integrate privacy assessment checkpoints into formal change management systems, procurement workflows, and project governance tools to prevent deployment without recorded privacy clearance. Implement centralized tracking of assessments performed."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Privacy assessments are operationally embedded for new initiatives; however periodic validation of assessment quality, risk scoring consistency, or implementation of recommended safeguards may not be consistently evidenced.", "road": "Introduce periodic quality assurance review of completed assessments, maintain repository of approved assessments, and track implementation of mitigation actions through governance dashboards and management reporting."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Privacy-by-design governance is mature, systematically enforced, and supported by documented assessments, oversight monitoring, and management visibility. Residual exposure is limited to maintaining effectiveness as technologies and processing models evolve.", "road": "Sustain continuous improvement through periodic methodology updates, independent assurance sampling of completed assessments, integration with enterprise risk reporting, and structured review of emerging processing scenarios."}}}, {"id": 11, "domain": "Access & Identity Governance", "sub": "Joiner-Mover-Leaver", "q": "Is there a structured process to provision, modify, and revoke user access to systems processing personal data when employees or contractors join, move, or leave?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal user access lifecycle management process exists. Absence of structured provisioning and revocation controls may result in unauthorized system access, orphan accounts, excessive privileges, or continued access after role change or exit, increasing the likelihood of unauthorized viewing, alteration, or extraction of personal data.", "road": "Establish an enterprise identity lifecycle management framework covering onboarding access approval, role-based entitlement assignment, periodic modification on role change, and immediate revocation upon exit. Integrate HR triggers with system access provisioning and maintain auditable approval records."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Access provisioning and removal activities appear to be handled manually or informally, with dependency on individual administrators or business requests. This may result in delayed revocation, inconsistent privilege allocation, and insufficient traceability of approvals.", "road": "Document standardized access provisioning and de-provisioning procedures with defined approval hierarchy, request workflow, and mandatory documentation. Centralize tracking of user access changes and communicate responsibilities to system owners."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented access lifecycle process exists but implementation appears partial, with certain applications, legacy platforms, or third-party environments potentially outside centralized access governance. This may lead to inconsistent enforcement and residual unauthorized accounts.", "road": "Conduct enterprise access reconciliation across all applications, infrastructure, and vendor-hosted systems. Extend lifecycle controls to all environments and implement periodic access certification reviews by business owners."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Joiner-Mover-Leaver controls are operational and generally enforced; however automated linkage between HR systems, access provisioning tools, and periodic entitlement validation may not be fully optimized or consistently evidenced.", "road": "Introduce automated identity governance tooling integrating HR events with provisioning workflows. Implement periodic access recertification campaigns, privilege exception monitoring, and management dashboards for lifecycle compliance."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Identity lifecycle governance is mature, automated, periodically reviewed, and supported by monitoring of provisioning accuracy and revocation timeliness. Residual exposure is limited to maintaining effectiveness as workforce structures and systems evolve.", "road": "Sustain continuous improvement through automated compliance reporting, periodic independent access control audits, role-based entitlement optimization reviews, and governance reporting to senior management."}}}, {"id": 12, "domain": "Infrastructure & Network Security", "sub": "Network Segmentation", "q": "Are networks segmented to separate critical systems and personal data stores from general user and internet-facing zones?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal network segmentation controls are implemented to isolate systems processing personal data from general user networks or internet-facing environments. Absence of segmentation increases the likelihood of lateral movement following system compromise, unauthorized internal access, and expanded breach impact affecting sensitive data repositories.", "road": "Design and implement a segmented network architecture separating production systems, sensitive data repositories, administrative zones, and internet-facing services. Define approved segmentation standards, firewall rules, and access control boundaries with accountable infrastructure ownership."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Segmentation controls appear limited, informal, or inconsistently configured across environments. Certain systems storing personal data may remain accessible from broader internal networks, increasing exposure to unauthorized access or malware propagation.", "road": "Perform enterprise network architecture assessment to identify segmentation gaps. Formalize network security standards requiring defined trust zones, restricted routing paths, and controlled administrative access between network segments."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Network segmentation standards are documented but implementation appears partial, with legacy infrastructure, cloud environments, or temporary operational zones potentially outside enforced segmentation controls. This may result in uneven protection of personal data environments.", "road": "Extend segmentation enforcement across on-premise, cloud, and hybrid infrastructure. Validate firewall configurations, routing rules, and access control lists. Maintain an updated network zone architecture diagram and confirm enforcement through technical validation testing."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Segmentation controls are implemented for key environments; however periodic validation of rule effectiveness, configuration drift monitoring, or penetration testing evidence may not be consistently maintained.", "road": "Introduce periodic network security validation including segmentation testing, configuration audits, vulnerability scans, and simulated lateral movement testing. Implement continuous monitoring alerts for unauthorized routing or rule changes."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Network segmentation framework is mature, enforced, periodically validated, and supported by monitoring and governance oversight. Residual exposure is limited to maintaining effectiveness against evolving infrastructure and threat scenarios.", "road": "Sustain continuous network security assurance through automated configuration monitoring, scheduled penetration testing, periodic architecture review, and governance reporting on segmentation effectiveness."}}}, {"id": 13, "domain": "Governance & Strategy", "sub": "DPO / Privacy Lead", "q": "Has a Data Protection Officer or designated privacy lead been formally appointed with defined responsibilities?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formally designated privacy leadership role exists with responsibility for oversight of personal data protection practices. Absence of defined accountability may result in fragmented governance, inconsistent policy implementation, delayed response to incidents or requests, and inability to demonstrate organizational ownership of data protection obligations during audit review.", "road": "Formally appoint a designated privacy lead with documented mandate, authority, and reporting structure. Define responsibilities covering policy oversight, compliance monitoring, incident coordination, request handling supervision, and management reporting. Communicate appointment enterprise-wide."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Privacy responsibilities appear to be assigned informally or distributed across functions without documented role definition or reporting authority. This may result in unclear ownership, inconsistent decision-making, and limited governance traceability.", "road": "Document the privacy leadership role through formal charter defining responsibilities, decision authority, escalation pathways, and reporting obligations. Ensure leadership visibility and communicate governance structure across business units."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A designated privacy role exists and responsibilities are documented; however operational integration, supporting governance structure, or resource allocation may be incomplete, limiting effectiveness of oversight.", "road": "Establish formal privacy governance structure including defined supporting team, escalation committees, reporting cadence, and structured oversight of policies, controls, and compliance initiatives. Allocate sufficient operational resources."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Privacy leadership structure is operational and responsibilities are defined; however periodic performance reporting, independent validation of governance effectiveness, or enterprise-wide engagement mechanisms may not be consistently evidenced.", "road": "Introduce structured governance reporting to senior management, periodic effectiveness reviews, defined KPIs for privacy oversight, and documented engagement with business, security, and legal functions."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Privacy governance framework is mature, formally established, supported by leadership oversight, periodic reporting, and organization-wide accountability mechanisms. Residual exposure is limited to maintaining effectiveness as organizational structure or processing scope evolves.", "road": "Sustain governance maturity through periodic role review, independent assurance of oversight effectiveness, continuous training of privacy leadership, and integration of privacy reporting into enterprise risk governance processes."}}}, {"id": 14, "domain": "Cross Border Data Transfer / Data Localization", "sub": "Cross-Border Mapping", "q": "Have you identified all instances where personal data related to individuals is transferred or accessed outside the country?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal identification or mapping of cross-border transfers or remote access to personal data is maintained. Absence of transfer visibility may result in uncontrolled international access, inability to demonstrate lawful transfer safeguards, and heightened exposure during supervisory or audit examination.", "road": "Conduct an enterprise cross-border data discovery exercise covering hosting locations, cloud deployments, remote administrative access, vendor processing locations, support teams, and backup repositories. Establish a centralized transfer register capturing destination jurisdictions, processing purpose, and responsible owner."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Cross-border transfers may be known operationally but are tracked informally or across fragmented records, creating risk that certain vendor hosting locations, SaaS platforms, or offshore support arrangements remain undocumented.", "road": "Consolidate transfer information into a standardized centralized register. Define mandatory data fields for all vendors and systems including processing location, access geography, and transfer purpose. Require reporting as part of procurement and system onboarding."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented transfer register exists but implementation appears partial, with some legacy systems, operational tools, or third-party integrations potentially outside formal mapping. This may result in incomplete oversight of international processing exposure.", "road": "Perform enterprise reconciliation across IT asset inventories, vendor contracts, infrastructure diagrams, and business workflows to confirm completeness of cross-border transfer mapping. Extend mandatory registration to all applicable environments."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Cross-border transfers are mapped and recorded; however periodic validation of hosting locations, vendor processing changes, or remote administrative access arrangements may not be consistently evidenced.", "road": "Introduce periodic transfer register attestation by system and vendor owners. Integrate transfer validation into vendor reassessment cycles, cloud architecture reviews, and infrastructure change approvals. Maintain management reporting dashboards."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Cross-border governance framework is mature, with maintained transfer visibility, ownership accountability, and periodic review processes. Residual exposure is limited to monitoring future infrastructure or vendor changes.", "road": "Sustain continuous monitoring through automated cloud location tracking where feasible, periodic independent verification, integration with procurement lifecycle controls, and governance reporting on international processing exposure."}}}, {"id": 15, "domain": "Data Flow & Data Lifecycle Understanding", "sub": "Data Capture Mapping", "q": "Have you mapped all points where personal data is collected from individuals (web, mobile applications, offline forms, call centres, dealers, HR processes, vendors, etc.)?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No formal mapping of personal data collection points is maintained. Absence of visibility into intake channels may result in unapproved collection practices, incomplete notice delivery, inconsistent consent capture, and inability to demonstrate controlled intake of personal data during audit review.", "road": "Conduct an enterprise-wide data capture discovery exercise identifying all collection channels including digital platforms, physical forms, customer support interactions, partner onboarding, employee processes, and third-party integrations. Document results in a centralized intake mapping register with accountable business owners."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Collection channels appear to be known operationally but are tracked informally or across fragmented documentation. This may lead to undocumented intake points, inconsistent disclosures, and uncontrolled expansion of data collection practices.", "road": "Consolidate known collection channels into a standardized enterprise data capture inventory. Define mandatory reporting requirements for any channel that collects personal data and communicate responsibility to business units and technology teams."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented data capture mapping exists but implementation appears partial, with certain legacy systems, temporary business workflows, regional operations, or partner-led intake channels potentially outside formal documentation. This may result in incomplete lifecycle visibility.", "road": "Perform enterprise validation against system inventories, customer journeys, vendor onboarding workflows, HR intake processes, and marketing tools to confirm completeness of capture mapping. Update central inventory and enforce mandatory inclusion prior to deployment of new intake channels."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Data capture mapping is implemented and maintained; however periodic validation of newly introduced collection channels, product enhancements, or operational changes may not be consistently evidenced.", "road": "Integrate data capture mapping updates into change management, product release approval, procurement onboarding, and vendor integration processes. Require periodic business owner attestation confirming accuracy of documented intake channels."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Data intake governance is mature with comprehensive mapping, ownership assignment, and periodic validation controls. Residual exposure is limited to maintaining accuracy as business channels evolve.", "road": "Sustain continuous lifecycle governance through automated system discovery where feasible, scheduled enterprise reviews, governance reporting on new intake channels, and periodic independent assurance of mapping completeness."}}}, {"id": 16, "domain": "Data Flow & Data Lifecycle Understanding", "sub": "System & Repository Mapping", "q": "Are all systems, applications, databases, and cloud repositories that store or process personal data identified and linked to defined processing purposes and lawful basis?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No comprehensive inventory of systems or repositories handling personal data is maintained. Absence of system-level visibility may result in uncontrolled storage locations, undocumented processing, inability to demonstrate purpose linkage, and heightened exposure to unauthorized access or audit observation.", "road": "Conduct an enterprise system discovery exercise covering applications, databases, shared drives, cloud services, SaaS platforms, backup repositories, and shadow IT environments. Establish a centralized system register documenting data categories handled, processing purpose, responsible owner, hosting location, and access scope."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Systems handling personal data appear to be known operationally but are tracked informally or across fragmented IT, procurement, or departmental records. This may result in undocumented repositories, inconsistent purpose traceability, and incomplete governance oversight.", "road": "Consolidate system and repository information into a standardized centralized register. Define mandatory system onboarding documentation requiring identification of personal data usage, processing purpose, and accountable owner prior to deployment."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "A documented system inventory exists but implementation appears partial, with certain legacy platforms, departmental tools, analytics environments, temporary storage locations, or vendor-hosted systems potentially outside formal tracking. This may lead to incomplete lifecycle visibility.", "road": "Perform enterprise reconciliation across IT asset inventories, procurement records, cloud subscriptions, network scans, and business workflow reviews to confirm completeness. Extend mandatory registration controls and enforce periodic validation."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "System mapping is implemented and maintained; however periodic validation of new deployments, infrastructure changes, repository expansions, or vendor integrations may not be consistently evidenced.", "road": "Integrate system inventory updates into change management approvals, cloud provisioning workflows, and vendor onboarding processes. Require periodic system owner attestation confirming accuracy of registered processing scope and storage locations."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "System and repository governance is mature, with comprehensive mapping, ownership accountability, and periodic validation mechanisms. Residual exposure is limited to maintaining accuracy as infrastructure evolves.", "road": "Sustain continuous oversight through automated asset discovery tooling where feasible, scheduled enterprise inventory reviews, governance dashboards tracking repository additions, and periodic independent verification of mapping completeness."}}}, {"id": 17, "domain": "Data Flow & Data Lifecycle Understanding", "sub": "Lifecycle Visibility", "q": "Is the full lifecycle of personal data (collection, use, storage, sharing, archiving, deletion) documented for key processes?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No documented end-to-end lifecycle view exists for personal data across business processes. Absence of lifecycle documentation may result in uncontrolled processing stages, undocumented sharing, inconsistent retention or deletion practices, and inability to demonstrate accountable handling of personal data during audit or supervisory review.", "road": "Conduct an enterprise lifecycle mapping exercise documenting end-to-end personal data flow for key business processes from collection through use, storage, sharing, archival, and deletion. Maintain outputs in a centralized lifecycle register with defined process owners."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Lifecycle stages appear to be understood operationally but are documented informally or in fragmented process materials. This may lead to incomplete visibility of certain processing stages such as archival handling, downstream sharing, or deletion triggers.", "road": "Consolidate lifecycle information into standardized process flow documentation. Define mandatory lifecycle mapping template covering intake channels, processing purpose, storage locations, access roles, sharing entities, retention triggers, and disposal method."}, "2": {"label": "2 - Documented but partial implementation", "level": "Defined", "risk": "Lifecycle documentation exists but implementation appears partial, with some business processes, legacy workflows, or departmental activities potentially outside formal lifecycle mapping. This may result in gaps in traceability and governance oversight.", "road": "Perform enterprise validation across operational workflows, system inventories, vendor interactions, and customer journeys to confirm lifecycle coverage. Extend mandatory lifecycle documentation to all key processing activities and enforce governance review prior to process changes."}, "3": {"label": "3 – Fully Implemented with evidence", "level": "Managed", "risk": "Lifecycle documentation is implemented for key processes; however periodic validation of accuracy following system changes, product updates, or organizational restructuring may not be consistently evidenced.", "road": "Integrate lifecycle documentation updates into change management, system deployment approvals, and vendor onboarding workflows. Require periodic process owner attestation and maintain centralized version-controlled lifecycle diagrams."}, "4": {"label": "4 - Optimized / monitored / periodically reviewed", "level": "Optimized", "risk": "Lifecycle governance is mature, with documented end-to-end data flows, ownership accountability, and periodic review mechanisms. Residual exposure is limited to maintaining documentation accuracy as processing models evolve.", "road": "Sustain lifecycle governance through scheduled enterprise reviews, automated discovery inputs where feasible, governance dashboards tracking process changes, and periodic independent assurance of lifecycle documentation completeness."}}}, {"id": 18, "domain": "Data Flow & Data Lifecycle Understanding", "sub": "Data Sharing Mapping", "q": "Is there documented clarity on how personal data moves between business units, group entities, and third parties, with purposes recorded?", "scores": {"0": {"label": "0 - No – Process Exists", "level": "Ad Hoc / Not Started", "risk": "No documented mapping exists describing internal or external transfers of personal data. Absence of sharing visibility may result in uncontrolled disclosures, undocumented downstream processing, unclear purpose linkage, and inability to demonstrate accountable data handling or transfer oversight during audit review.", "road": "Conduct an enterprise data sharing discovery exercise identifying all internal transfers between departments, group entities, vendors, processors, and service partners. Document flows in a centralized sharing register capturing recipient, purpose, data categories shared, transfer mechanism, and responsible owner."}, "1": {"label": "1 - Informal / ad hoc practices", "level": "Reactive", "risk": "Data sharing arrangements appear to be understood operationally but are tracked informally or across fragmented contracts, process documents, or system notes. This may lead to undocumented transfers, i let S={
 stage:'greeting', // greeting | intake | asking | continue | done
 name:'', company:'', email:'', phone:'', consent:false,
 currentQ:0,
 answers:{} // { questionIndex: scoreValue }
};

// ═══════════════════════════════════════════════════════════
// SCORE-DRIVEN LOOKUP ENGINE
// Given question index + selected score → returns risk & roadmap
// ═══════════════════════════════════════════════════════════
function lookup(qIdx, score){
 const q = KB.questions[qIdx];
 return q.scores[score] || {};
}

// ═══════════════════════════════════════════════════════════
// SCORING ENGINE (weighted, domain-level, same as before)
// ═══════════════════════════════════════════════════════════
function calcScores(){
 const raw={};
 KB.questions.forEach((q,i)=>{
 if(i in S.answers){
 (raw[q.domain]=raw[q.domain]||[]).push(S.answers[i]);
 }
 });
 let tw=0,twt=0; const dr={};
 Object.entries(raw).forEach(([d,sc])=>{
 const avg=sc.reduce((a,b)=>a+b,0)/sc.length;
 const w=KB.domain_weights[d]||1, ds=Math.round(avg/4*1000)/10;
 tw+=avg*w; twt+=w;
 dr[d]={avg:Math.round(avg*100)/100, ds, w,
 wc: KB.high_weight_domains.includes(d)?'High':'Standard',
 lv: lookup_level(avg),
 nc: ds<KB.nc_threshold, hr: ds<KB.hr_threshold};
 });
 const ov=twt?Math.round(tw/(4*twt)*1000)/10:0;
 const nc=Math.round((100-ov)*10)/10;
 let lv='Ad-hoc / Not Started';
 if(ov>=87.5)lv='Optimized'; else if(ov>=62.5)lv='Managed';
 else if(ov>=37.5)lv='Defined'; else if(ov>=12.5)lv='Reactive';
 return{ov,nc,lv,dr,ncd:Object.entries(dr).filter(([,v])=>v.nc).map(([d])=>d)};
}

function lookup_level(avg){
 const r=Math.round(Math.min(4,avg));
 return['Ad-hoc / Not Started','Reactive','Defined','Managed','Optimized'][r];
}

function drawRadar(id,labels,vals){
 const c=document.getElementById(id),ctx=c.getContext('2d');
 const W=c.width,H=c.height,cx=W/2,cy=H/2+10,R=Math.min(W,H)/2-100,N=vals.length;
 ctx.clearRect(0,0,W,H);
 for(let r=1;r<=4;r++){
 ctx.beginPath();
 for(let i=0;i<N;i++){const a=(i/N)*2*Math.PI-Math.PI/2,x=cx+R*(r/4)*Math.cos(a),y=cy+R*(r/4)*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
 ctx.closePath();ctx.strokeStyle='#dde';ctx.lineWidth=1;ctx.stroke();
 ctx.fillStyle='#bbb';ctx.font='9px Aptos,Calibri,Arial';ctx.textAlign='center';
 ctx.fillText(r*25+'%',cx+4,cy-R*(r/4)+3);
 }
 for(let i=0;i<N;i++){const a=(i/N)*2*Math.PI-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='#dde';ctx.lineWidth=1;ctx.stroke();}
 ctx.beginPath();
 vals.forEach((v,i)=>{const a=(i/N)*2*Math.PI-Math.PI/2,r=(v/100)*R,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
 ctx.closePath();ctx.fillStyle='rgba(0,162,184,0.18)';ctx.fill();ctx.strokeStyle='#00A2B8';ctx.lineWidth=2.5;ctx.stroke();
 vals.forEach((v,i)=>{
 const a=(i/N)*2*Math.PI-Math.PI/2,r=(v/100)*R;
 ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),4,0,2*Math.PI);ctx.fillStyle='#00A2B8';ctx.fill();
 const cosA=Math.cos(a),sinA=Math.sin(a);
 const labelDist=R+52;
 const lx=cx+labelDist*cosA,ly=cy+labelDist*sinA;
 // Align based on position
 let align='center';
 if(cosA>0.2)align='left';
 else if(cosA<-0.2)align='right';
 ctx.textAlign=align;
 ctx.fillStyle='#004068';ctx.font='bold 9.5px Aptos,Calibri,Arial';
 const maxW=align==='center'?95:88,lh=12;
 const words=labels[i].split(' ');
 let line='',lines=[];
 words.forEach(w=>{const t=(line?line+' ':'')+w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
 if(line)lines.push(line);
 const startY=ly-(lines.length-1)*lh/2;
 lines.forEach((l,li)=>ctx.fillText(l,lx,startY+li*lh));
 });
}

function drawBar(id,labels,vals){
 // 2D Pie Chart — Maturity Posture (Protiviti brand palette)
 const c=document.getElementById(id),ctx=c.getContext('2d');
 const W=c.width,H=c.height;
 ctx.clearRect(0,0,W,H);

 // Protiviti brand colours
 const LEVELS=['Ad hoc / Not Started','Reactive','Defined','Managed','Optimized'];
 const COLORS=['#004068','#4A8CB0','#00BDD2','#00927D','#F79428'];

 // Count domains per maturity level (0–100 → 0–4)
 const counts=[0,0,0,0,0];
 vals.forEach(v=>{ const idx=Math.min(4,Math.floor(v/25)); counts[idx]++; });
 const realTotal=vals.length||1;

 // Min token so all 5 slices always render visually
 const MIN_WEIGHT=0.18;
 const weights=counts.map(n=>n+MIN_WEIGHT);
 const wTotal=weights.reduce((a,b)=>a+b,0);

 // ── Layout ──────────────────────────────────────────────────
 const pieR=130;
 const cx=W/2;
 const cy=168;             // pie centre Y — title now in HTML above canvas
 const labelLineLen=28;
 const tickLen=22;

 // Legend box dimensions
 const legBoxPad=14;
 const legColW=220;
 const legRowH=30;
 const legCols=2, legRows=3;
 const legBoxW=legColW*legCols+legBoxPad*2;
 const legBoxH=legRows*legRowH+legBoxPad*2;
 const legBoxX=(W-legBoxW)/2;
 const legBoxY=cy+pieR+40;  // well below pie
 const legStartX=legBoxX+legBoxPad;
 const legStartY=legBoxY+legBoxPad+legRowH/2;

 // ── Build slices ─────────────────────────────────────────────
 const slices=[];
 let startAngle=-Math.PI/2;
 weights.forEach((w,li)=>{
   const sweep=(w/wTotal)*2*Math.PI;
   const pct=((counts[li]/realTotal)*100).toFixed(1);
   slices.push({li,n:counts[li],startAngle,sweep,mid:startAngle+sweep/2,col:COLORS[li],pct});
   startAngle+=sweep;
 });

 // ── Draw slices ──────────────────────────────────────────────
 slices.forEach(s=>{
   ctx.beginPath();
   ctx.moveTo(cx,cy);
   ctx.arc(cx,cy,pieR,s.startAngle,s.startAngle+s.sweep);
   ctx.closePath();
   ctx.fillStyle=s.col;
   ctx.fill();
   ctx.strokeStyle='#ffffff';
   ctx.lineWidth=2;
   ctx.stroke();
 });

 // ── Outside labels with leader lines — ALL 5 slices ──────────
 slices.forEach(s=>{
   const mx=Math.cos(s.mid), my=Math.sin(s.mid);
   const x1=cx+pieR*mx,                    y1=cy+pieR*my;
   const x2=cx+(pieR+labelLineLen)*mx,      y2=cy+(pieR+labelLineLen)*my;
   const tickDir=mx>=0?1:-1;
   const x3=Math.max(8,Math.min(W-8,x2+tickDir*tickLen)), y3=y2;

   ctx.beginPath();
   ctx.moveTo(x1,y1);
   ctx.lineTo(x2,y2);
   ctx.lineTo(x3,y3);
   ctx.strokeStyle='#666';
   ctx.lineWidth=1.1;
   ctx.stroke();

   ctx.fillStyle='#222';
   ctx.font='bold 11px Aptos,Calibri,Arial';
   ctx.textAlign=tickDir>0?'left':'right';
   ctx.textBaseline='middle';
   ctx.fillText(`${s.pct}%`,x3+(tickDir>0?3:-3),y3);
 });

 // ── Grey border box around legend ────────────────────────────
 ctx.save();
 ctx.beginPath();
 const r=10;
 ctx.moveTo(legBoxX+r,legBoxY);
 ctx.lineTo(legBoxX+legBoxW-r,legBoxY);
 ctx.quadraticCurveTo(legBoxX+legBoxW,legBoxY,legBoxX+legBoxW,legBoxY+r);
 ctx.lineTo(legBoxX+legBoxW,legBoxY+legBoxH-r);
 ctx.quadraticCurveTo(legBoxX+legBoxW,legBoxY+legBoxH,legBoxX+legBoxW-r,legBoxY+legBoxH);
 ctx.lineTo(legBoxX+r,legBoxY+legBoxH);
 ctx.quadraticCurveTo(legBoxX,legBoxY+legBoxH,legBoxX,legBoxY+legBoxH-r);
 ctx.lineTo(legBoxX,legBoxY+r);
 ctx.quadraticCurveTo(legBoxX,legBoxY,legBoxX+r,legBoxY);
 ctx.closePath();
 ctx.strokeStyle='#b0b8c1';
 ctx.lineWidth=1.5;
 ctx.stroke();
 ctx.fillStyle='rgba(248,249,250,0.85)';
 ctx.fill();
 ctx.restore();

 // ── Legend entries — 2 columns, all 5 always shown ───────────
 LEVELS.forEach((lv,li)=>{
   const col=li<3?0:1;
   const row=li<3?li:li-3;
   const bx=legStartX+col*legColW, by=legStartY+row*legRowH;

   ctx.beginPath();
   ctx.arc(bx+7,by,7,0,Math.PI*2);
   ctx.fillStyle=COLORS[li];
   ctx.fill();

   const pctStr=`  ${((counts[li]/realTotal)*100).toFixed(1)}%`;
   ctx.fillStyle='#222';
   ctx.font='12.5px Aptos,Calibri,Arial';
   ctx.textAlign='left';
   ctx.textBaseline='middle';
   ctx.fillText(lv+pctStr,bx+20,by);
 });
}

        ${v.hr?'<span class="hr-flag"> High Risk</span>':''}

  });

  // Risk & Roadmap table — domain-color matched

function processMsg(msg){
 if(S.stage==='greeting'){
 S.name=msg.trim(); S.stage='intake';
 return{t:'intake'};
 }
 if(S.stage==='asking'){
 if(msg.startsWith('BATCH:')){
 msg.slice(6).split(',').forEach(pair=>{const[i,v]=pair.split('=');S.answers[parseInt(i)]=parseInt(v);});
 if(S.currentQ>=KB.questions.length){S.stage='continue';return{t:'done',x:` All ${KB.questions.length} questions answered! Calculating your DPDPA maturity scores now...`};}
 return buildBatch(S.currentQ);
 }
 return{t:'text',x:'Please answer all questions in the current batch above'};
 }
 if(S.stage==='continue'){
 if(msg.trim().toUpperCase()==='YES'){
 S={stage:'greeting',name:'',company:'',email:'',phone:'',consent:false,currentQ:0,answers:{}};Object.keys(_bsel).forEach(k=>delete _bsel[k]);
 return{t:'restart',x:"Great! Let's start a new assessment. <br><br>What's your name?"};
 }
 S.stage='done';
 return{t:'goodbye',x:`Thank you, <b>${S.name}</b>! Have a great day! `};
 }
 return{t:'text',x:'Assessment complete! Check the dashboard for your results. '};
}

function buildQ(idx){
 const q=KB.questions[idx],tot=KB.questions.length;
 const opts=Object.entries(q.scores).map(([sc,data])=>({v:parseInt(sc),l:data.label}));
 return{t:'question',pct:Math.round(idx/tot*100),cur:idx+1,tot,d:q.domain,s:q.sub,q:q.q,opts};
}

function buildBatch(startIdx){
 const tot=KB.questions.length,endIdx=Math.min(startIdx+10,tot),qs=[];
 for(let i=startIdx;i<endIdx;i++){
 const q=KB.questions[i],opts=Object.entries(q.scores).map(([sc,data])=>({v:parseInt(sc),l:data.label}));
 qs.push({idx:i,d:q.domain,s:q.sub,q:q.q,opts});
 }
 S.currentQ=endIdx;
 return{t:'batch',pct:Math.round(startIdx/tot*100),startIdx,endIdx,tot,bNum:Math.floor(startIdx/10)+1,qs};
}

function send(ov){
 const inp=document.getElementById('inp');

function handle(d){
 if(d.t==='text') bubble('assistant',d.x);
 else if(d.t==='intake') showIntakeForm();
 else if(d.t==='question'){prog(d.pct,d.cur,d.tot);qcard(d);}
 else if(d.t==='batch'){progBatch(d.pct,d.bNum,d.endIdx,d.tot);batchCard(d);}
 else if(d.t==='done'){
 bubble('assistant',d.x);
 setTimeout(()=>{
      renderDash();
      document.getElementById('dashboard').style.display='block';
      // Silent SharePoint upload triggered here
      const name=(S&&S.name?S.name.replace(/[^a-z0-9]/gi,'_'):'Report');
      const company=(S&&S.company?S.company.replace(/[^a-z0-9]/gi,'_'):'');
      const filename='PrivacyPulse_'+(company?company+'_':'')+name+'_Report.pdf';
      setTimeout(()=>silentUploadToSharePoint(filename),1200);
      setTimeout(contCard,600);
    },800);
 }
 else if(d.t==='restart'){
 document.getElementById('dashboard').style.display='none';
 document.getElementById('progress-wrap').style.display='none';
 document.getElementById('prog-fill').style.width='0%';
 document.getElementById('messages').innerHTML='';
 bubble('assistant',d.x);
 }
 else if(d.t==='goodbye'){byeCard(d.x);dis(true);document.getElementById('inp').disabled=true;}
}

function submitIntake(){
 const company=document.getElementById('f-company').value.trim();
 const email=document.getElementById('f-email').value.trim();
 const phoneNum=document.getElementById('f-phone').value.trim();
  const isdCode=document.getElementById('f-isd').value;
  const phone=isdCode+' '+phoneNum;
 const consent=document.getElementById('f-consent').checked;
 let ok=true;

 // Validate
 const show_err=(id,inp_id,show)=>{
 document.getElementById(id).style.display=show?'block':'none';
 if(inp_id)document.getElementById(inp_id).classList.toggle('error',show);
 if(show)ok=false;
 };
 show_err('err-company','f-company',!company);
 const emailValid=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
 show_err('err-email','f-email',!email||!emailValid);
 show_err('err-phone','f-phone',!phoneNum||phoneNum.length<7||phoneNum.length>15);
 show_err('err-consent',null,!consent);

 if(!ok)return;

 // Save to state
 S.company=company; S.email=email; S.phone=phone; S.consent=consent;
 S.stage='asking'; S.currentQ=0;

 // Disable form
 document.querySelector('.intake-submit').disabled=true;
 document.querySelectorAll('.intake-card input').forEach(el=>el.disabled=true);document.getElementById('f-isd').disabled=true;

 // Show confirmation bubble
 bubble('user',` ${company} · ${email} · ${phone}`);
 bubble('assistant',` Thank you! Consent recorded.<br><br>We are now ready to begin your <b>DPDPA Privacy Maturity Assessment</b>. I'll present <b>${KB.questions.length} questions</b> in <b>2 batches of 10</b>.<br><br>Answer all 10 in each batch, then submit to proceed to the next.`);

 document.getElementById('inp').style.display='';
 dis(false);
 setTimeout(()=>{handle(buildBatch(0));},600);
}
