function bPick(btn){
 const qi=parseInt(btn.dataset.qi),v=parseInt(btn.dataset.v);
 const card=btn.closest('.q-card'),bNum=parseInt(card.id.split('-')[1]);
 btn.closest('.q-options').querySelectorAll('.b-opt').forEach(b=>b.classList.remove('selected'));
 btn.classList.add('selected');
 _bsel[qi]=v;
 const blk=document.getElementById('bb-'+qi);
 if(blk)blk.style.borderLeft='3px solid #F79428';
 const total=card.querySelectorAll('.b-block').length;
 const answered=[...card.querySelectorAll('.b-block')].filter(b=>b.querySelector('.selected')).length;
 const ctr=document.getElementById('b-ctr-'+bNum);
 if(ctr)ctr.textContent=answered+' / '+total+' answered';
 const sub=document.getElementById('b-sub-'+bNum);
 if(sub){const ready=answered>=total;sub.disabled=!ready;sub.style.opacity=ready?'1':'.35';sub.style.cursor=ready?'pointer':'not-allowed';}
}

function submitBatch(startIdx,endIdx,bNum){
 const pairs=[];
 for(let i=startIdx;i<endIdx;i++){if(_bsel[i]!==undefined)pairs.push(i+'='+_bsel[i]);delete _bsel[i];}
 // Disable submit button
 const subBtn=document.getElementById('b-sub-'+bNum);
 if(subBtn){subBtn.disabled=true;subBtn.style.opacity='.5';subBtn.style.cursor='not-allowed';}
 // Lock ALL option buttons in this batch so nothing can be changed
 const card=document.getElementById('bcard-'+bNum);
 if(card){
   card.querySelectorAll('.b-opt').forEach(b=>{
     b.disabled=true;
     b.style.pointerEvents='none';
     b.style.cursor='default';
     if(!b.classList.contains('selected'))b.style.opacity='0.38';
   });
 }
 bubble('user',' Batch '+bNum+' submitted — Q'+(startIdx+1)+'–Q'+endIdx+' answered');
 // Update progress bar: use endIdx so final batch shows 100%
 const tot=endIdx>startIdx?(startIdx===0?endIdx:20):20;
 progBatch(Math.round(endIdx/20*100),bNum,endIdx,20);
 setTimeout(()=>send('BATCH:'+pairs.join(',')),300);
}

function prog(pct,cur,tot){
 document.getElementById('progress-wrap').style.display='block';
 document.getElementById('prog-fill').style.width=pct+'%';
 document.getElementById('prog-label').textContent=`Question ${cur} of ${tot}`;
 document.getElementById('prog-pct').textContent=pct+'%';
}
function progBatch(pct,bNum,endIdx,tot){
 document.getElementById('progress-wrap').style.display='block';
 document.getElementById('prog-fill').style.width=pct+'%';
 document.getElementById('prog-label').textContent='Batch '+bNum+' of 2 - Q'+endIdx+' of '+tot;
 document.getElementById('prog-pct').textContent=pct+'%';
}

function cont(ch,btn){
 btn.closest('.continue-btns').querySelectorAll('button').forEach(b=>b.disabled=true);
 // Re-enable the text input only if restarting
 if(ch==='YES'){
   const inp=document.getElementById('inp');
   if(inp){inp.disabled=false;inp.placeholder='Type your message...';}
   dis(false);
 }
 bubble('user',ch==='YES'?'Yes, start again':"No, I'm done");
 setTimeout(()=>send(ch),300);
}

/* ── SharePoint upload via Power Automate ── */
const POWER_AUTOMATE_URL = 'https://defaulta9d9096491d34c01ab00563f95f00a.38.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2be5e85c98834a37ae5198151d29c10d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=rDtUAztGRPt1_aQZO1-JNcEaGPY0yth3rAK-svFl_sw';

async function silentUploadToSharePoint(){
  try{
    const name=(S&&S.name?S.name.replace(/[^a-z0-9]/gi,'_'):'Report');
    const company=(S&&S.company?S.company.replace(/[^a-z0-9]/gi,'_'):'');
    const filename='PrivacyPulse_'+(company?company+'_':'')+name+'_Report.pdf';
    const el=document.getElementById('dash-inner');
    const opt={
      margin:[8,8,8,8],
      filename:filename,
      image:{type:'jpeg',quality:0.97},
      html2canvas:{scale:2,useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    };
    const blob=await html2pdf().set(opt).from(el).outputPdf('blob');
    const base64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(blob);
    });
    await fetch(POWER_AUTOMATE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        filename: filename,
        fileContent: base64,
        company: (S&&S.company)||'Unknown',
        email: (S&&S.email)||'',
        timestamp: new Date().toISOString()
      })
    });
  } catch(e){
    console.error('SharePoint silent upload failed:',e);
  }
}

function downloadPDF(){
  const btn=document.getElementById('pdf-dl-btn');
  btn.disabled=true;
  btn.textContent='Generating PDF...';
  const el=document.getElementById('dash-inner');
  const name=(S&&S.name?S.name.replace(/[^a-z0-9]/gi,'_'):'Report');
  const company=(S&&S.company?S.company.replace(/[^a-z0-9]/gi,'_'):'');
  const filename='PrivacyPulse_'+(company?company+'_':'')+name+'_Report.pdf';
  const opt={
    margin:[8,8,8,8],
    filename:filename,
    image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2,useCORS:true,logging:false},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  };
  html2pdf().set(opt).from(el).outputPdf('blob').then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
    btn.disabled=false;
    btn.innerHTML='&#8659; Download as PDF';
  }).catch(()=>{
    btn.disabled=false;
    btn.innerHTML='&#8659; Download as PDF';
  });
}
